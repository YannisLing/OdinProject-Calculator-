<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calculator">
    <div class="display"></div>
    <div class="functions">
      <button class="clear" data-value="c">CLEAR</button>
      <button class="delete" data-value="d"="">DELETE</button>
    </div>
    <div class="buttons">
      <div class="line">
        <button class="number7" data-value="7"="">7</button>
        <button class="number8" data-value="8">8</button>
        <button class="number9" data-value="9">9</button>
        <button class="chufa" data-value="/"="">÷</button>
      </div>
      <div class="line">
        <button class="number4" data-value="4">4</button>
        <button class="number5" data-value="5"="">5</button>
        <button class="number6" data-value="6">6</button>
        <button class="chengfa" data-value="*"="">×</button>
      </div>
      <div class="line">
        <button class="number1" data-value="1">1</button>
        <button class="number2" data-value="2"="">2</button>
        <button class="number3" data-value="3">3</button>
        <button class="jianfa" data-value="-">-</button>
      </div>
      <div class="line">
        <button class="point" data-value=".">.</button>
        <button class="number0" data-value="0">0</button>
        <button class="denghao" data-value="=">=</button>
        <button class="jiafa"
        data-value="+">+</button>
      </div>
    </div>
  </div>
</body>
<script src="script.js"></script>
</html>
